name: Bake quotes
on:
  schedule:
    - cron: '30 2 * * 1-5'
    - cron: '30 3 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 7 * * 1-5'
    - cron: '10 21 * * 1-5'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: bake-quotes
  cancel-in-progress: false
jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch quotes from worker
        run: python3 .github/scripts/fetch_quotes.py
      - name: Commit if changed
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add quotes.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "chore: bake quotes"
            for i in 1 2 3; do git push && break || { git pull --rebase && sleep 3; }; done
          fi
