<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>정기 시험 모의고사</title>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
<style>
  :root{
    color-scheme:light;
    --bg:#F2F1EC; --card:#FFFFFF; --ink:#181820; --sub:#83838E;
    --line:#E6E4DC; --line-strong:#D8D6CC;
    --brand:#3D3AD4; --brand-soft:#ECEBFB;
    --ok:#177E55; --ok-bg:#E4F3EB; --ok-line:#9FD6BC;
    --no:#C5362B; --no-bg:#FBEAE7; --no-line:#EDB3AC;
    --radius:18px;
    --shadow:0 1px 2px rgba(24,24,32,.04), 0 8px 24px rgba(24,24,32,.06);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  :root[data-theme="dark"]{
    color-scheme:dark;
    --bg:#131318; --card:#1E1E26; --ink:#F1F0EA; --sub:#9696A2;
    --line:#2B2B35; --line-strong:#3B3B47;
    --brand:#8E89FF; --brand-soft:#272540;
    --ok:#48C68F; --ok-bg:#14302A; --ok-line:#2F6B54;
    --no:#F0746A; --no-bg:#371F1D; --no-line:#6E3A35;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 28px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;line-height:1.5;letter-spacing:-0.01em;
    transition:background .25s var(--ease), color .25s var(--ease);}
  /* 호스트(iframe/앱 미리보기)가 배경을 어둡게 강제해도 테마색이 항상 보이도록 고정 배경 레이어 */
  body::before{content:"";position:fixed;inset:0;background:var(--bg);z-index:-1;
    transition:background .25s var(--ease)}
  button{font-family:inherit;cursor:pointer}
  .wrap{max-width:560px;margin:0 auto;min-height:100dvh;
    padding:calc(env(safe-area-inset-top) + 14px) 18px calc(env(safe-area-inset-bottom) + 18px);
    display:flex;flex-direction:column;}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .counter{font-variant-numeric:tabular-nums;font-weight:600;font-size:14px;color:var(--sub);white-space:nowrap}
  .counter b{color:var(--ink)}
  .bar{flex:1;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
  .bar > i{display:block;height:100%;width:0%;background:var(--brand);border-radius:99px;transition:width .45s var(--ease)}
  .back{appearance:none;border:none;background:none;color:var(--sub);font-size:14px;font-weight:600;padding:0}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 20px}

  .start{flex:1;display:flex;flex-direction:column;justify-content:center}
  .start-head{text-align:center;margin-bottom:8px}
  .eyebrow{font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--brand);text-transform:uppercase}
  .start-head h1{margin:5px 0 0;font-size:27px;font-weight:800;letter-spacing:-0.03em}
  .start-head p{margin:6px 0 0;color:var(--sub);font-size:14.5px}

  .field{margin-top:22px;text-align:left}
  .field-label{font-size:12.5px;font-weight:700;color:var(--sub);letter-spacing:.05em;margin:0 4px 9px}
  .seg{display:grid;gap:8px}
  .seg.c4{grid-template-columns:repeat(4,1fr)}
  .seg.c2{grid-template-columns:repeat(2,1fr)}
  .seg button{border:1.5px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:13px;padding:13px 0;font-size:14.5px;font-weight:700;
    font-variant-numeric:tabular-nums;transition:all .15s var(--ease);}
  .seg button[aria-pressed="true"]{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}

  .toggle{display:flex;align-items:center;justify-content:space-between;width:100%;
    padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:var(--card);text-align:left}
  .toggle .tlabel{font-size:15px;font-weight:600}
  .toggle .tdesc{font-size:12.5px;color:var(--sub);margin-top:2px}
  .switch{position:relative;width:46px;height:28px;border-radius:99px;background:var(--line-strong);
    transition:background .25s var(--ease);flex:none;margin-left:14px}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:transform .25s var(--ease)}
  .toggle[aria-pressed="true"] .switch{background:var(--brand)}
  .toggle[aria-pressed="true"] .switch::after{transform:translateX(18px)}
  .toggle.disabled{opacity:.4;pointer-events:none}

  .q-eyebrow{font-size:13px;font-weight:700;color:var(--sub);letter-spacing:.04em;font-variant-numeric:tabular-nums;margin-bottom:10px}
  .q-text{font-size:19px;font-weight:700;letter-spacing:-0.02em;line-height:1.5;margin:0 0 20px;white-space:pre-wrap;word-break:break-word}
  .options{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:15px;
    font-size:16px;font-weight:500;color:var(--ink);min-height:54px;
    transition:border-color .15s var(--ease), background .15s var(--ease), transform .08s var(--ease);}
  button.opt:active{transform:scale(.99)}
  .opt .mark{flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line-strong);
    display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--sub);
    font-variant-numeric:tabular-nums;margin-top:-1px;transition:all .15s var(--ease)}
  .opt .otext{flex:1;padding-top:1px;word-break:break-word}
  .opt.is-correct{border-color:var(--ok-line);background:var(--ok-bg)}
  .opt.is-correct .mark{border-color:var(--ok);background:var(--ok);color:#fff}
  .opt.is-wrong{border-color:var(--no-line);background:var(--no-bg)}
  .opt.is-wrong .mark{border-color:var(--no);background:var(--no);color:#fff}
  .opt.locked{cursor:default}
  .opt.locked.dim{opacity:.5}

  .verdict{margin-top:18px;display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;opacity:0;transform:translateY(4px)}
  .verdict.show{opacity:1;transform:none;transition:all .3s var(--ease)}
  .verdict.ok{color:var(--ok)} .verdict.no{color:var(--no)}
  .explain{margin-top:10px;font-size:14.5px;color:var(--sub);line-height:1.55;padding-left:2px;white-space:pre-wrap;opacity:0}
  .explain.show{opacity:1;transition:opacity .3s var(--ease) .05s}

  /* 정답 같이 보기 (학습 모드) */
  .study-item{margin-bottom:14px}
  .study-item .q-text{font-size:17px;margin-bottom:14px}
  .study-item .opt{min-height:0;padding:12px 14px;font-size:15px}
  .ans-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;
    color:var(--ok);background:var(--ok-bg);border:1px solid var(--ok-line);
    padding:3px 9px;border-radius:99px;margin-top:14px}

  .footer{margin-top:auto;padding-top:20px}
  .btn{width:100%;border:none;border-radius:14px;padding:17px;font-size:16px;font-weight:700;
    letter-spacing:-0.01em;background:var(--brand);color:#fff;transition:opacity .15s var(--ease), transform .08s var(--ease)}
  .btn:active{transform:scale(.99)}
  .btn:disabled{opacity:.32;cursor:default}
  .btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line-strong)}
  .btn + .btn{margin-top:10px}

  .result{flex:1;display:flex;flex-direction:column;justify-content:center}
  .score-card{text-align:center;padding:34px 20px}
  .score-num{font-size:64px;font-weight:800;letter-spacing:-0.04em;line-height:1;font-variant-numeric:tabular-nums}
  .score-num small{font-size:26px;color:var(--sub);font-weight:700}
  .score-sub{margin-top:10px;color:var(--sub);font-size:15px;font-weight:600;font-variant-numeric:tabular-nums}
  .score-tag{display:inline-block;margin-top:16px;padding:7px 16px;border-radius:99px;font-size:14px;font-weight:700;background:var(--brand-soft);color:var(--brand)}
  .review-title{font-size:14px;font-weight:700;color:var(--sub);margin:26px 4px 10px;letter-spacing:.02em}
  .review-item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:9px}
  .review-q{font-size:15px;font-weight:600;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .review-a{margin-top:8px;font-size:13.5px;line-height:1.5}
  .review-a .lab{font-weight:700}
  .review-a .yours{color:var(--no)} .review-a .right{color:var(--ok)}

  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
  :focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:8px}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const QUIZ = {
  title: "정기 시험 모의고사",
  subtitle: "中医 정기고사 · 객관식",

const app = document.getElementById("app");
const LETTERS = "ABCDE";
const prefersDark = ()=> !!(window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches);

let opts = { count:20, shuffleOpts:true, mode:'quiz', theme: prefersDark()?'dark':'light' };
let session = null;

function applyTheme(){ document.documentElement.setAttribute('data-theme', opts.theme); }
const shuffle = a => { const r=a.slice();
  for(let i=r.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[r[i],r[j]]=[r[j],r[i]];} return r; };

function buildSession(sourceIdx){
  const total = QUIZ.questions.length;
  let idx = sourceIdx || QUIZ.questions.map((_,i)=>i);
  if(!sourceIdx && opts.count < total) idx = shuffle(idx).slice(0, opts.count);
  const list = idx.map(srcIndex=>{
    const base = QUIZ.questions[srcIndex];
    let order = base.options.map((_,i)=>i);
    if(opts.shuffleOpts) order = shuffle(order);
    return { srcIndex, q: base.q, explain: base.explain||"",
      options: order.map(i=>base.options[i]), answer: order.indexOf(base.answer) };
  });
  session = { list, pos:0, log:[] };
}

/* ---------- 시작 화면 ---------- */
function renderStart(){
  applyTheme();
  const total = QUIZ.questions.length;
  const counts=[20,50,100,total], clabels=["20","50","100","전체"];
  app.innerHTML = `
    <div class="start">
      <div class="start-head">
        <div class="eyebrow">${QUIZ.subtitle}</div>
        <h1>${QUIZ.title}</h1>
        <p>총 ${total}문항</p>
      </div>

      <div class="field">
        <div class="field-label">테마</div>
        <div class="seg c2" id="segTheme">
          <button data-t="light" aria-pressed="${opts.theme==='light'}">라이트</button>
          <button data-t="dark"  aria-pressed="${opts.theme==='dark'}">다크</button>
        </div>
      </div>

      <div class="field">
        <div class="field-label">모드</div>
        <div class="seg c2" id="segMode">
          <button data-m="quiz"  aria-pressed="${opts.mode==='quiz'}">문제 풀기</button>
          <button data-m="study" aria-pressed="${opts.mode==='study'}">정답 같이 보기</button>
        </div>
      </div>

      <div class="field">
        <div class="field-label">문항 수</div>
        <div class="seg c4" id="segCount">
          ${counts.map((c,i)=>`<button data-c="${c}" aria-pressed="${opts.count===c}">${clabels[i]}</button>`).join("")}
        </div>
      </div>

      <div class="field">
        <button class="toggle${opts.mode==='study'?' disabled':''}" id="tgO"
                aria-pressed="${opts.shuffleOpts}" aria-disabled="${opts.mode==='study'}">
          <span><span class="tlabel">보기 순서 섞기</span><div class="tdesc">정답 위치 외우기 방지</div></span>
          <span class="switch"></span>
        </button>
      </div>
    </div>
    <div class="footer">
      <button class="btn" id="start">${opts.mode==='study'?'정답 보기':'시작하기'}</button>
    </div>`;

  document.querySelectorAll("#segTheme button").forEach(b=>{
    b.onclick=()=>{ opts.theme=b.dataset.t; applyTheme();
      document.querySelectorAll("#segTheme button").forEach(x=>x.setAttribute("aria-pressed",x===b)); };
  });
  document.querySelectorAll("#segMode button").forEach(b=>{
    b.onclick=()=>{                                   // 모드 변경: 다시 그리지 않고 제자리에서만 갱신 → 레이아웃 고정
      opts.mode=b.dataset.m;
      document.querySelectorAll("#segMode button").forEach(x=>x.setAttribute("aria-pressed",x===b));
      const study = opts.mode==='study';
      const tgEl=document.getElementById("tgO");
      tgEl.classList.toggle("disabled", study);
      tgEl.setAttribute("aria-disabled", study);
      document.getElementById("start").textContent = study ? "정답 보기" : "시작하기";
    };
  });
  document.querySelectorAll("#segCount button").forEach(b=>{
    b.onclick=()=>{ opts.count=parseInt(b.dataset.c,10);
      document.querySelectorAll("#segCount button").forEach(x=>x.setAttribute("aria-pressed",x===b)); };
  });
  const tg=document.getElementById("tgO");
  tg.onclick=e=>{ opts.shuffleOpts=!opts.shuffleOpts; e.currentTarget.setAttribute("aria-pressed",opts.shuffleOpts); };

  document.getElementById("start").onclick=()=>{
    if(opts.mode==='study') renderStudy();
    else { buildSession(); renderQuestion(); }
  };
}

        <div class="options">
          ${b.options.map((o,i)=>`
            <div class="opt ${i===b.answer?'is-correct':''}">
              <span class="mark">${i===b.answer?'✓':(LETTERS[i]||i+1)}</span>
              <span class="otext">${escapeHtml(o)}</span>
            </div>`).join("")}
        </div>
        ${b.explain?`<div class="explain show">${escapeHtml(b.explain)}</div>`:``}
      </div>`;
    }).join("")}
    <div class="footer"><button class="btn ghost" id="backBtn">처음으로</button></div>`;

  document.getElementById("back").onclick=renderStart;
  document.getElementById("backBtn").onclick=renderStart;
  window.scrollTo(0,0);
}

/* ---------- 문제 풀기 ---------- */
function renderQuestion(){
  const {list,pos}=session, item=list[pos], pct=(pos/list.length)*100;
  app.innerHTML = `
    <div class="topbar">
      <button class="back" id="back">← 나가기</button>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="counter"><b>${pos+1}</b> / ${list.length}</div>
    </div>
    <div class="card">
      <div class="q-eyebrow">문제 ${pos+1}</div>
      <p class="q-text">${escapeHtml(item.q)}</p>
      <div class="options" id="options">
        ${item.options.map((o,i)=>`
          <button class="opt" data-i="${i}">
            <span class="mark">${LETTERS[i]||i+1}</span>
            <span class="otext">${escapeHtml(o)}</span>
          </button>`).join("")}
      </div>
      <div class="verdict" id="verdict"></div>
      <div class="explain" id="explain"></div>
    </div>
    <div class="footer">
      <button class="btn" id="next" disabled>${pos+1===list.length?"결과 보기":"다음 문제"}</button>
    </div>`;
  requestAnimationFrame(()=>{ const bi=app.querySelector(".bar > i"); if(bi) bi.style.width=pct+"%"; });
  document.getElementById("back").onclick=renderStart;
  document.querySelectorAll("#options .opt").forEach(btn=>{ btn.onclick=()=>selectAnswer(parseInt(btn.dataset.i,10)); });
  document.getElementById("next").onclick=()=>{
    session.pos++;
    if(session.pos>=list.length) renderResult(); else renderQuestion();
  };
  window.scrollTo(0,0);
}

function selectAnswer(chosen){
  const item=session.list[session.pos];
  const correct = chosen===item.answer;
  session.log.push({srcIndex:item.srcIndex, chosen, correct});
  document.querySelectorAll("#options .opt").forEach(btn=>{
    const i=parseInt(btn.dataset.i,10);
    btn.classList.add("locked"); btn.disabled=true;
    if(i===item.answer) btn.classList.add("is-correct");
    else if(i===chosen) btn.classList.add("is-wrong");
    else btn.classList.add("dim");
  });
  const v=document.getElementById("verdict");
  v.classList.add("show", correct?"ok":"no");
  v.textContent = correct?"정답입니다":"오답입니다";
  if(item.explain){ const ex=document.getElementById("explain"); ex.textContent=item.explain; ex.classList.add("show"); }
  document.getElementById("next").disabled=false;
}

function renderResult(){
  const total=session.log.length, right=session.log.filter(l=>l.correct).length;
  const pct=Math.round((right/total)*100);
  const wrong=session.log.filter(l=>!l.correct);
  let tag="조금 더 연습해요";
  if(pct===100) tag="만점이에요"; else if(pct>=80) tag="아주 잘했어요"; else if(pct>=60) tag="괜찮아요, 한 걸음 더";
  const reviewHtml = wrong.length ? `
    <div class="review-title">틀린 문제 ${wrong.length}개</div>
    ${wrong.map(l=>{ const b=QUIZ.questions[l.srcIndex];
      return `<div class="review-item">
        <div class="review-q">${escapeHtml(b.q)}</div>
        <div class="review-a">
          <div><span class="lab yours">내 답</span> · ${escapeHtml(optionTextFor(l))}</div>
          <div><span class="lab right">정답</span> · ${escapeHtml(b.options[b.answer])}</div>
        </div></div>`; }).join("")}`
    : `<div class="review-title">전부 맞혔어요 ✨</div>`;
  app.innerHTML = `
    <div class="result">
      <div class="card score-card">
        <div class="score-num">${pct}<small>%</small></div>
        <div class="score-sub">${total}문제 중 ${right}개 정답</div>
        <div class="score-tag">${tag}</div>
      </div>
      ${reviewHtml}
    </div>
    <div class="footer">
      ${wrong.length?`<button class="btn" id="retryWrong">틀린 문제만 다시 풀기</button>`:""}
      <button class="btn ${wrong.length?"ghost":""}" id="retryAll">새로 풀기</button>
    </div>`;
  document.getElementById("retryAll").onclick=renderStart;
  const rw=document.getElementById("retryWrong");
  if(rw) rw.onclick=()=>{ const idx=[...new Set(wrong.map(l=>l.srcIndex))]; buildSession(idx); renderQuestion(); };
  window.scrollTo(0,0);
}

function optionTextFor(log){ const item=session.list.find(it=>it.srcIndex===log.srcIndex); return item?item.options[log.chosen]:""; }
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

applyTheme();
renderStart();
</script>
</body>
</html>
